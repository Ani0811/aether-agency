name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency:
      group: "pages"
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          BASE: /${{ github.event.repository.name }}/
          VITE_API_BACKEND_URL: https://aether-agency.onrender.com
          VITE_GA_MEASUREMENT_ID: G-SRHQVZHVB6
          VITE_SUPABASE_URL: https://thsqjwkbqaewdyymeybd.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_ZavSkUfMM-Ei-wQKPFkuEQ_LQoyiCNX
          VITE_RAZORPAY_KEY_ID: rzp_live_SryWapq4eo2mbB
        run: npm run build

      - name: Deploy manually to gh-pages branch
        run: |
          cd dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy to GitHub Pages (Bypassing Outage)"
          git push --force "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:gh-pages
